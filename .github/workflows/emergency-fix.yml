REAL_KEY="AIzaSyA8EwPnJ98V4C6d71b5faUjjDtc_dBJoQA"

echo "🚀 Sblocco finale in corso..."

# Forza Node v22 in tutti i workflow (Risolve l'errore rosso dei log)
